apiVersion: apps/v1
kind: Deployment
metadata:
  name: assignment-deploy
spec:
  selector:
    matchLabels:
      app: assignment-app
  replicas: 1
  template: 
    metadata:
      labels:
        app: assignment-app
    spec:
      containers:
        - name: assignment
          image: vinsdocker/k8s-deploy-assignment
          ports:
            - containerPort: 8080
              name: "app-port"
          env:
            - name: "spring.redis.host"
              value: "10.244.2.23"
            - name: "spring.redis.port"
              value: "6379"