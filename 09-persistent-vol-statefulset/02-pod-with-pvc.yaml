apiVersion: v1
kind: Pod
metadata:
  name: my-pod
spec:
  terminationGracePeriodSeconds: 2
  restartPolicy: Never
  containers:
    - name: nginx
      image: nginx
      volumeMounts:
        - name: pod-pvc
          mountPath: /usr/share/nginx/html
  volumes:
    - name: pod-pvc
      persistentVolumeClaim:
        claimName: my-pvc
