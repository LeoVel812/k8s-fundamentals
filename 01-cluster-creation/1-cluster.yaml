kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
name: dev-cluster
nodes:
  - role: control-plane
    extraPortMappings:
      - containerPort: 30001
        hostPort: 30001
        protocol: TCP
  - role: worker
  - role: worker
# to start the cluster with kind:  kind create cluster --config .\1-cluster.yaml
# to exit the cluster:  kind delete cluster --name dev-cluster
