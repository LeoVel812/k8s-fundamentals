apiVersion: v1
kind: Pod
metadata:
  name: my-pod
spec:
  terminationGracePeriodSeconds: 2
  restartPolicy: Never
  containers:
    - name: ubuntu-cntn
      image: ubuntu
      # Mount the Secret as a volume
      volumeMounts:
        - name: secret-vol
          mountPath: /usr/keys
          readOnly: true
      args:
      - "sleep"
      - "360"
  # Define the volume that sources from the Secret
  volumes:
    - name: secret-vol
      secret:
        secretName: app-secret
