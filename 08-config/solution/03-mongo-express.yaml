apiVersion: apps/v1
kind: Deployment
metadata:
  name: mongo-exp-app
spec:
  selector:
    matchLabels:
      app: mongo-exp
  replicas: 1
  template:
    metadata:
      labels:
        app: mongo-exp
    spec:
      containers:
        - name: mongo-exp
          image: mongo-express:1.0.0-alpha.4
          envFrom:
            - secretRef:
                name: express-secret
          ports:
            - containerPort: 8081
          env:
            - name: ME_CONFIG_MONGODB_SERVER
              value: mongo-service
---
apiVersion: v1
kind: Service
metadata:
  name: mongo-exp-service
spec:
  selector:
    app: mongo-exp
  ports:
    - port: 8081
      targetPort: 8081