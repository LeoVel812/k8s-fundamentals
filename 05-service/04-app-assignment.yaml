apiVersion: apps/v1
kind: Deployment
metadata:
  name: assignment-dp
spec:
  selector:
    matchLabels:
      app: assignment-app
  replicas: 1
  template: 
    metadata:
      labels:
        app: assignment-app
    spec:
      containers:
        - name: assignment
          image: vinsdocker/k8s-deploy-assignment
          ports:
            - containerPort: 8080
              name: "app-port"
          env:
            - name: "spring.redis.host"
              value: "redis-svc"
            - name: "spring.redis.port"
              value: "6379"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis-deploy
spec:
  selector:
    matchLabels:
      app: redis-app
  replicas: 1
  template: 
    metadata:
      labels:
        app: redis-app
    spec:
      containers:
        - name: redis-container
          image: redis
          ports:
            - containerPort: 6379
              name: "redis-port"
---
apiVersion: v1
kind: Service
metadata:
  name: redis-svc
spec:
  selector:
    app: redis-app
  ports:
    - port: 6379
      targetPort: 6379
