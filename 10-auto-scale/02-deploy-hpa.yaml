apiVersion: apps/v1
kind: Deployment
metadata:
  name: my-deploy
spec:
  selector:
    matchLabels:
      app: my-app
  replicas: 1
  template:
    metadata:
      labels:
        app: my-app
    spec:
      containers:
        - name: nginx-cntnr
          image: nginx
          resources:
            requests:
              cpu: "50m"
              memory: "10Mi"
            limits:
              cpu: "50m"
              memory: "10Mi"
          startupProbe:
            httpGet:
              path: /
              port: 80
            periodSeconds: 1
            failureThreshold: 30
          # readinessProbe is used to check if the container is ready to serve traffic. 
          # If the readiness probe fails, the pod will be removed from the service endpoints 
          # and will not receive traffic until it becomes ready again.
          # This will make sure that there are no failed requests when the cluster is autoscaling.
          readinessProbe:
            httpGet:
              path: /
              port: 80
            periodSeconds: 5
            failureThreshold: 3
---
apiVersion: v1
kind: Service
metadata:
  name: nginx-svc
spec:
  selector:
    app: my-app
  ports:
    - port: 80
      targetPort: 80
---
# This pod is used to test the load balancing of the service.
# It will send requests to the service and print the responses.
apiVersion: v1
kind: Pod
metadata:
  name: demo-pod
spec:
  terminationGracePeriodSeconds: 1
  containers:
    - name: demo-pod
      image: vinsdocker/util
      args:
        - "sleep"
        - "3600"
